server.port=8080

# Redis (docker 네트워크 내 컨테이너명)
spring.data.redis.host=redis

# Kafka (docker 네트워크 INTERNAL listener)
spring.kafka.bootstrap-servers=kafka:9094

# 인터서비스 URL (Docker DNS). user는 core-service로 이관
user-service.base-url=http://core-service:8080
payment-service.base-url=http://payment-service:8080

# Virtual Thread
spring.threads.virtual.enabled=true

# HikariCP (K8s 5 pods 기준: 20 x 5 = 100 connections)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000

# Lettuce Connection Pool
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=8
