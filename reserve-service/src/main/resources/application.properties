spring.application.name=reserve-service
server.port=8082

# NeonDB (PostgreSQL JPA)
spring.datasource.url=${RESERVE_DB_URL}
spring.datasource.username=${RESERVE_DB_USERNAME}
spring.datasource.password=${RESERVE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# Queue throttle (requests per second)
queue.throttle.rate=20

# Seat hold TTL (ms). 10분.
reserve.hold.ttl-millis=600000

# user-service base URL (docker compose 기본)
user-service.base-url=http://user-service:8081

