spring.application.name=reserve-service
server.port=8082

# JPA


# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# Queue throttle (requests per second)
queue.throttle.rate=20

# Seat hold TTL (ms). 10분.
reserve.hold.ttl-millis=600000

spring.config.import=optional:classpath:database.properties
