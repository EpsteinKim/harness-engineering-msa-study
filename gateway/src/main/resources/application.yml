                  args:
                    retries: 3
                    statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2

            - id: reserve-docs
              uri: http://reserve-service:8080
              predicates:
                - Path=/api-docs/reserve
