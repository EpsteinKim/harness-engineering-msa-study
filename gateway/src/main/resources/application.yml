              predicates:
                - Path=/api/v1/reservations/**

            - id: payment-service
              uri: http://payment-service:8080
              predicates:
                - Path=/api/v1/payments/**

            - id: reserve-docs
              uri: http://reserve-service:8080
              predicates:
                - Path=/api-docs/reserve
              filters:
                - SetPath=/v3/api-docs

            - id: user-docs
              uri: http://user-service:8080
              predicates:
                - Path=/api-docs/user
              filters:
                - SetPath=/v3/api-docs

            - id: payment-docs
              uri: http://payment-service:8080
              predicates:
