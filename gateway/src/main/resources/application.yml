server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 15s
        pool:
          type: fixed
          max-connections: 2000
          acquire-timeout: 3000
          max-idle-time: 10s
      server:
        webflux:
          routes:
            - id: core-service-users
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/users/**

            - id: core-service-events
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/events/**

            - id: reserve-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/reservations/**
              filters:
                - name: Retry
                  args:
                    retries: 3
                    statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - name: Retry
                  args:
                    retries: 3
                    statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 50ms
                      maxBackoff: 500ms
                      factor: 2

            # Swagger 통합 — 각 서비스의 /v3/api-docs를 gateway 경로에 노출
            - id: reserve-docs
              uri: http://localhost:8082
              predicates:
                - Path=/api-docs/reserve
              filters:
                - SetPath=/v3/api-docs

            - id: core-docs
              uri: http://localhost:8084
              predicates:
                - Path=/api-docs/core
              filters:
                - SetPath=/v3/api-docs

            - id: payment-docs
              uri: http://localhost:8083
              predicates:
                - Path=/api-docs/payment
              filters:
                - SetPath=/v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: reserve-service
        url: /api-docs/reserve
      - name: core-service
        url: /api-docs/core
      - name: payment-service
        url: /api-docs/payment

---
spring:
  config:
    activate:
