services:
  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 8080
    ports:
      - "8988:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - core-service
      - reserve-service
      - payment-service
    networks:
      - harness-net

  reserve-service:
    build:
      context: .
      args:
        SERVICE_NAME: reserve-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=${RESERVE_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${RESERVE_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${RESERVE_DB_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - harness-net

  core-service:
    build:
      context: .
      args:
        SERVICE_NAME: core-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=${CORE_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${CORE_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${CORE_DB_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - harness-net

  payment-service:
    build:
      context: .
      args:
        SERVICE_NAME: payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=${PAYMENT_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${PAYMENT_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${PAYMENT_DB_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - harness-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - harness-net

  kafka:
    image: apache/kafka:4.1.0
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "KAFKA-PRACTICE-HARNESS-0"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - harness-net

volumes:
  redis-data:
  kafka-data:

networks:
  harness-net:
    driver: bridge
