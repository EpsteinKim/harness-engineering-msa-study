services:
  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 8080
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - user-service
      - reserve-service
    networks:
      - harness-net

  reserve-service:
    build:
      context: .
      args:
        SERVICE_NAME: reserve-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - NEONDB_URL=${RESERVE_DB_URL}
      - NEONDB_USERNAME=${RESERVE_DB_USERNAME}
      - NEONDB_PASSWORD=${RESERVE_DB_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - harness-net

  user-service:
    build:
      context: .
      args:
        SERVICE_NAME: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NEONDB_URL=${USER_DB_URL}
      - NEONDB_USERNAME=${USER_DB_USERNAME}
      - NEONDB_PASSWORD=${USER_DB_PASSWORD}
    networks:
      - harness-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - harness-net

volumes:
  redis-data:

networks:
  harness-net:
    driver: bridge
